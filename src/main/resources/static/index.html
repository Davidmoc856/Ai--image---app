<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saint Image AI Gen - Gallery</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            margin: 0;
            color: whitesmoke;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 900px;
            backdrop-filter: blur(25px);
            display: flex; flex-direction: column; gap: 20px;
        }
        textarea {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px; color: whitesmoke; padding: 18px; font-size: 16px; box-sizing: border-box; resize: none;
        }
        button {
            background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 12px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }

        /* Progress Bar Styles */
        #progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #3b82f6; transition: width 0.5s ease; }

        /* Gallery Grid */
        #output-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }
        .image-card {
            background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden;
            display: flex; flex-direction: column; animation: fadeIn 0.5s ease;
        }
        .image-card img { width: 100%; height: auto; display: block; }
        .download-btn {
            background: rgba(255,255,255,0.1); color: white; text-decoration: none;
            text-align: center; padding: 10px; font-size: 14px; transition: 0.3s;
        }
        .download-btn:hover { background: rgba(59, 130, 246, 0.5); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <h1>AI Image Gallery Generator</h1>
    <textarea id="prompt" placeholder="Describe your vision..."></textarea>
    <button id="genBtn" onclick="generate()">Generate Images 🌚</button>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="output-grid"></div>
</div>

<script>
    async function generate() {
        const prompt = document.getElementById('prompt').value;
        const grid = document.getElementById('output-grid');
        const bar = document.getElementById('progress-bar');
        const barContainer = document.getElementById('progress-container');
        const btn = document.getElementById('genBtn');

        if(!prompt) { alert("Enter a prompt!"); return; }

        // UI Reset
        grid.innerHTML = "";
        barContainer.style.display = "block";
        bar.style.width = "30%"; // Initial jump
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const response = await fetch('/api/image/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            bar.style.width = "70%";
            const data = await response.json();

            if (data.error) {
                grid.innerHTML = `<p style='color:red;'>${data.error}</p>`;
            } else {
                bar.style.width = "100%";
                data.images.forEach((imgSrc, index) => {const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <img src="${imgSrc}" alt="AI Image ${index + 1}">
                        <a href="${imgSrc}" download="AI_Image_${index+1}.png" class="download-btn">Download Image</a>
                    `;
                    grid.appendChild(card);
                });
            }
        } catch (error) {
            grid.innerHTML = "<p style='color:red;'>Failed to connect to backend.</p>";
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate Images 🌚";
            setTimeout(() => { barContainer.style.display = "none"; bar.style.width = "0%"; }, 2000);
        }
    }
</script>
</body>
</html>
